AWSTemplateFormatVersion: "2010-09-09"
Description: GitHub Actions OIDC deploy role for hono-learn

Parameters:
  GitHubOrg:
    Type: String
    Description: GitHub username or organization
  GitHubRepo:
    Type: String
    Default: hono-learn

Resources:
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: hono-learn-deploy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOIDCProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/main"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCloudFormationFullAccess
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
      Policies:
        - PolicyName: SAMDeployPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Lambda
              - Effect: Allow
                Action:
                  - lambda:*
                Resource: "*"
              # API Gateway
              - Effect: Allow
                Action:
                  - apigateway:*
                Resource: "*"
              # IAM for Lambda execution roles
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:PassRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:UpdateRole
                Resource: "*"
              # VPC / Networking
              - Effect: Allow
                Action:
                  - ec2:*
                Resource: "*"
              # RDS
              - Effect: Allow
                Action:
                  - rds:*
                Resource: "*"
              # Secrets Manager
              - Effect: Allow
                Action:
                  - secretsmanager:*
                Resource: "*"
              # Service Linked Roles (needed for RDS, ELB, etc.)
              - Effect: Allow
                Action:
                  - iam:CreateServiceLinkedRole
                  - iam:DeleteServiceLinkedRole
                  - iam:GetServiceLinkedRoleDeletionStatus
                Resource: "arn:aws:iam::*:role/aws-service-role/*"

Outputs:
  DeployRoleArn:
    Description: Set this as AWS_ROLE_ARN in GitHub repo secrets
    Value: !GetAtt DeployRole.Arn
